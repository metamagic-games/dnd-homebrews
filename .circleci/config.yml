version: 2.1

orbs:
  node: circleci/node@5.2.0

jobs:
  verify:
    docker:
      - image: cimg/node:20.11
    working_directory: ~/repo
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
          override-ci-command: npm ci
      - run:
          name: Prettier check
          command: npm run format:check
      - run:
          name: Spellcheck
          command: npm run spellcheck
      - run:
          name: Jest smoke tests
          command: npm test -- --ci

workflows:
  version: 2
  build-and-test:
    jobs:
      - verify
